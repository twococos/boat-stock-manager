name: Deploy to GitHub Pages

# Desplegament alternatiu a GitHub Pages. El recomanat és Cloudflare Pages (veure
# README), però aquest workflow permet publicar directament des de GitHub.
#
# Cal configurar abans:
#   - Settings → Pages → Build and deployment → Source: GitHub Actions
#   - Settings → Secrets and variables → Actions → afegir VITE_SUPABASE_URL,
#     VITE_SUPABASE_ANON_KEY i (opcional) VITE_CREW_EMAIL com a "Repository secrets".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # GitHub Pages serveix sota /<nom-repo>/
          BASE_PATH: /${{ github.event.repository.name }}/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_CREW_EMAIL: ${{ secrets.VITE_CREW_EMAIL }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
